openapi: 3.0.3
info:
  title: EcoVert Mada API
  description: Platform for renewable energy, eco products, waste management and training
  version: 1.0.0

servers:
  - url: http://localhost:5000/api
    description: Local server

tags:
  - name: Auth
  - name: Users
  - name: Products
  - name: Orders
  - name: Courses
  - name: Energy
  - name: Waste
  - name: Recommendations

paths:

  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        201:
          description: User created

  /auth/login:
    post:
      tags: [Auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginInput'
      responses:
        200:
          description: JWT token returned

  /products:
    get:
      tags: [Products]
      summary: Get all products
      responses:
        200:
          description: Product list

    post:
      tags: [Products]
      summary: Create product
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductInput'
      responses:
        201:
          description: Product created

  /products/{id}:
    get:
      tags: [Products]
      summary: Get product by id
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Product detail

    put:
      tags: [Products]
      summary: Update product
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        200:
          description: Product updated

    delete:
      tags: [Products]
      summary: Delete product
      security:
        - bearerAuth: []
      responses:
        204:
          description: Product deleted

  /orders:
    post:
      tags: [Orders]
      summary: Create order
      security:
        - bearerAuth: []
      responses:
        201:
          description: Order created

    get:
      tags: [Orders]
      summary: Get all orders
      security:
        - bearerAuth: []
      responses:
        200:
          description: Order list

  /courses:
    get:
      tags: [Courses]
      summary: Get all courses
      responses:
        200:
          description: Course list

    post:
      tags: [Courses]
      summary: Create course
      security:
        - bearerAuth: []
      responses:
        201:
          description: Course created

  /courses/{id}/enroll:
    post:
      tags: [Courses]
      summary: Enroll to course
      security:
        - bearerAuth: []
      responses:
        201:
          description: Enrollment created

  /energy/solutions:
    get:
      tags: [Energy]
      summary: Get energy solutions
      responses:
        200:
          description: List of solutions

  /energy/request:
    post:
      tags: [Energy]
      summary: Submit energy project request
      security:
        - bearerAuth: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnergyRequest'
      responses:
        201:
          description: Energy request created

  /recommendations:
    post:
      tags: [Recommendations]
      summary: Get renewable energy recommendation
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EnergyRecommendationInput'
      responses:
        200:
          description: Recommendation generated

  /waste/types:
    get:
      tags: [Waste]
      summary: Get waste types
      responses:
        200:
          description: Waste types list

  /waste/solutions:
    get:
      tags: [Waste]
      summary: Get waste solutions
      responses:
        200:
          description: Waste solutions list

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    RegisterInput:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string

    LoginInput:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
        password:
          type: string

    ProductInput:
      type: object
      required:
        - name
        - price
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        categoryId:
          type: string
        stock:
          type: integer

    EnergyRequest:
      type: object
      properties:
        surface:
          type: number
        consumption:
          type: number
        budget:
          type: number
        location:
          type: string

    EnergyRecommendationInput:
      type: object
      required:
        - surface
        - consumption
        - budget
      properties:
        surface:
          type: number
        consumption:
          type: number
        budget:
          type: number
        location:
          type: string